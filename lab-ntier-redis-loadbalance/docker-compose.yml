version: '3.8'

services:
  # 1. API Service (Scaled to 3 Replicas)
  api:
    build: ./api
    environment:
      - REDIS_URL=redis://redis:6379
    deploy:
      replicas: 3
    networks:
      - lab-network

  # 2. Redis Cache Service
  redis:
    image: redis:alpine
    networks:
      - lab-network

  # 3. Nginx Load Balancer
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge
