version: '3.8'

services:
  # 1. Presentation Tier (Frontend)
  frontend:
    build: ./frontend
    environment:
      - PORT=3000
    networks:
      - ntier-network

  # 2. Application Tier (API)
  api:
    build: ./api
    environment:
      - PORT=5000
    networks:
      - ntier-network

  # 3. Web Server / Reverse Proxy Tier (Nginx)
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - api
    networks:
      - ntier-network

networks:
  ntier-network:
    driver: bridge
